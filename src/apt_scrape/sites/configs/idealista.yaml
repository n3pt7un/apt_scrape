site_id: idealista
display_name: Idealista.it
base_url: https://www.idealista.it
domain_pattern: 'idealista\.it'

# Idealista uses path-based filters: /{operation}-{property_type}/{city}/{area}/con-{filters}/
search_path_template: "/{operation}-{property_type}/{city}/"

# City slug for city-wide searches (no area).
# Idealista changed the city-level URL to use "milano-milano" while area-specific
# searches still use plain "milano" followed by the neighbourhood path.
#   city-only:  /affitto-case/milano-milano/con-...
#   with area:  /affitto-case/milano/comasina-bicocca/bicocca-bignami/con-...
city_no_area: milano-milano

# Path-based filter mapping (used by custom build_search_url)
path_filter_map:
  max_price: prezzo_{value}
  min_price: prezzo-min_{value}
  min_sqm: dimensione_{value}
  max_sqm: dimensione-max_{value}

# Room count mapping for path filters
room_filter_map:
  "2": bilocali-2
  "3": trilocali-3
  "4": quadrilocali-4
  "5": 5-locali-o-piu

# Sort: maps internal sort values to the pubblicato_ path filter.
# "newest" → add pubblicato_ultime-24-ore to the filter path.
# The ordine query param (?ordine=pubblicazione-desc) is separate and handled by the adapter.
sort_map:
  piu-recenti: ultime-24-ore
  recenti: ultime-24-ore
  data: ultime-24-ore
  newest: ultime-24-ore

# Area slug mapping: simple name → Idealista zone/neighborhood path
# Format: {macro-zone}/{specific-neighborhood}  (all verified 2026-03-15)
area_map:
  bicocca: comasina-bicocca/bicocca-bignami
  niguarda: comasina-bicocca/niguarda
  precotto: greco-turro/precotto
  loreto: greco-turro/nolo-brianza-pasteur
  citta-studi: citta-studi-lambrate/citta-studi
  lambrate: citta-studi-lambrate/lambrate
  turro: greco-turro/turro
  greco-segnano: greco-turro/greco
  crescenzago: greco-turro/crescenzago
  centrale: garibaldi-porta-venezia/centrale

# Pagination: changed from pagina-{page}.htm to lista-{page}.htm
page_param: pagina
page_path_template: "lista-{page}.htm"

search_wait_selector: "article.item"
detail_wait_selector: "h1"

property_type_map:
  case: case
  appartamenti: case
  attici: case
  ville: ville
  loft: case

operation_map:
  affitto: affitto
  vendita: vendita

search_selectors:
  listing_card:
    - "article.item"
    - "article[class*='item']"
  title:
    - "a.item-link"
    - "a[class*='item-link']"
    - "a[href*='/immobile/']"
  price:
    - "span.item-price"
    - "[class*='item-price']"
    - "[class*='price']"
  features:
    - "span.item-detail"
    - "[class*='item-detail']"
  address:
    - "span.item-link"
    - "[class*='item-link']"
  thumbnail:
    # Images now load directly into src (no longer data-ondemand-img / data-src)
    - "img[src*='img4.idealista']"
    - "img[src*='idealista.it']"
    - "picture img"
    - "img"
  description:
    - "div.item-description"
    - "[class*='item-description']"
    - "[class*='description']"

detail_selectors:
  title:
    - "h1"
  price:
    - "span.info-data-price"
    - "[class*='info-data-price']"
    - "[class*='price']"
  description:
    - "div.comment"
    - "[class*='comment']"
    - "[class*='description']"
  features_keys:
    # Features are in a plain <ul> (no class). Use info-features for summary (sqm/rooms/floor).
    # The full features UL has no distinguishing class; match via content-rich sibling lists.
    - "[class*='info-features']"
    - "ul li"
  features_values:
    - "[class*='info-features']"
    - "ul li"
  address:
    - "span.main-info__title-minor"
    - "[class*='main-info__title-minor']"
  photos:
    - "img[src*='img4.idealista']"
    - "img[src*='idealista.it/blur/WEB_DETAIL']"
    - "[class*='gallery'] img"
    - "picture img"
  energy_class:
    # Energy class is encoded in the CSS class name: e.g. "icon-energy-c-8" → class C
    - "[class*='icon-energy-']"
    - "[class*='energy-certificate']"
    - "[class*='energy']"
  agency:
    - "div.advertiser-name"
    - "[class*='advertiser-name']"
    - "[class*='advertiser']"
  costs_keys:
    - "div.details-property_costs dt"
    - "[class*='costs'] dt"
  costs_values:
    - "div.details-property_costs dd"
    - "[class*='costs'] dd"

login_url: "https://www.idealista.it/login"

min_request_delay: 4.0
max_request_delay: 8.0
detail_url_contains: "/immobile/"

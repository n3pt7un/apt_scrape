site_id: casa
display_name: Casa.it
base_url: https://www.casa.it
domain_pattern: 'casa\.it'

# Casa.it uses a single search endpoint /srp/ with all params as query strings.
# Location is identified by a zone hash in the `q=` parameter.
# Old path-based URLs (/affitto/residenziale/milano/...) do NOT apply filters —
# only the /srp/ endpoint with proper params works for filtered searches.
search_path_template: "/srp/"  # build_search_url in CasaAdapter overrides this fully

# Hash for the entire Milano municipality (used when no area is specified).
city_hash: "9f6485c2"

# Query parameter names (verified 2026-03-15 against /srp/ endpoint)
query_param_map:
  min_price: priceMin
  max_price: priceMax
  min_sqm: mqMin
  max_sqm: mqMax
  min_rooms: numRoomsMin
  max_rooms: numRoomsMax

page_param: page

# Casa.it's /srp/ page is a React SPA that hydrates listings client-side.
# domcontentloaded fires quickly; we then wait up to 45 s for the card
# selector to appear (React hydration in headless Firefox can take 20-40 s).
page_load_wait: domcontentloaded
search_wait_timeout: 45000
search_wait_selector: "[class*='csaSrpcard__cnt-card']"
detail_wait_selector: "h1[class*='csapdp-infos__tit']"

# `tr=` parameter values for operation
operation_map:
  affitto: affitti
  vendita: vendita

property_type_map:
  case: case
  appartamenti: appartamenti
  attici: attici
  ville: ville
  villette: villette

# Area slug → Casa.it zone hash for the /srp/?q= parameter.
# Hashes extracted 2026-03-15 from the zone picker on casa.it/srp/.
# Multiple slugs can share the same hash when they fall in the same macro-zone.
area_map:
  bicocca: "85ba3e0b"        # Bicocca, Ca' Granda, Parco Nord
  niguarda: "85ba3e0b"       # Niguarda is in the Bicocca/Ca' Granda/Parco Nord zone
  precotto: "82c10d65"       # Gorla, Greco, Precotto
  turro: "82c10d65"          # Turro also in Gorla/Greco/Precotto zone
  greco-segnano: "82c10d65"  # Greco/Segnano also in same zone
  loreto: "e4a6b323"         # Casoretto-NoLo (closest zone to Loreto/Via Padova)
  citta-studi: "f5d3d07b"    # Città Studi, Corsica, Susa
  lambrate: "3ef40a51"       # Lambrate
  crescenzago: "ece08626"    # Adriano, Crescenzago, Parco Lambro-Cimiano
  centrale: "9b4fa6fc"       # Centrale, Repubblica

# Selectors are unchanged — the /srp/ page uses the same CSS classes as before.
search_selectors:
  listing_card:
    - "[class*='csaSrpcard__cnt-card']"
  title:
    - "[class*='csaSrpcard__det__title--a']"
  price:
    - "[class*='csaSrpcard__det__feats--price']"
  features:
    - "[class*='csaSrpcard__det__feats__item']"
  address:
    - "[class*='csaSrpcard__det__infos'] p[class*='tp-s--m']"
  thumbnail:
    - "[class*='csaSrpcard__gal__slider__imgcont'] img"
  description:
    - "[class*='csaSrpcard__det__feats__desc']"
  agency:
    - "[class*='csaSrpcard__det__contacts__agz__name']"

detail_selectors:
  title:
    - "h1[class*='csapdp-infos__tit']"
    - "h1"
  price:
    - "[class*='csapdp-infos__price']"
  description:
    - "[class*='descr']"
  features_keys:
    - "[class*='chars_item'] [class*='chars__lbl']"
  features_values:
    - "[class*='chars_item'] [class*='chars__cnt']"
  address:
    - "h1[class*='csapdp-infos__tit']"
  photos:
    - "img[src*='/listing/']"
  energy_class:
    - "[class*='chars_item'] [class*='chars__cnt']"
  agency:
    - "[class*='specific-form'] a[href*='/agenzie/']"
    - "[class*='specific-form__form'] p[class*='pb--ms']"
  costs_keys:
    - "[class*='chars_item'] [class*='chars__lbl']"
  costs_values:
    - "[class*='chars_item'] [class*='chars__cnt']"

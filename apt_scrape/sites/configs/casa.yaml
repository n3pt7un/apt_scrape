site_id: casa
display_name: Casa.it
base_url: https://www.casa.it
domain_pattern: 'casa\.it'

# URL pattern: /affitto/residenziale/milano/{zone-slug}/?prezzoMax=X&prezzoMin=Y&...
# The base adapter appends the area slug after the city in the path.
# CasaAdapter.build_search_url translates our slug into the zone path first.
search_path_template: "/{operation}/residenziale/{city}/"

# Query parameter names (camelCase — verified 2026-03-15)
query_param_map:
  min_price: prezzoMin
  max_price: prezzoMax
  min_sqm: superficieMin
  max_sqm: superficieMax
  min_rooms: numLocaliMin
  max_rooms: numLocaliMax

page_param: page
search_wait_selector: "[class*='csaSrpcard__cnt-card']"
detail_wait_selector: "h1[class*='csapdp-infos__tit']"

property_type_map:
  case: residenziale
  appartamenti: residenziale
  attici: residenziale
  ville: residenziale
  villette: residenziale

operation_map:
  affitto: affitto
  vendita: vendita

# Area slug → Casa.it zone path segment.
# Casa.it groups neighbourhoods into macro-zones; multiple of our slugs
# can map to the same zone path (verified 2026-03-15).
area_map:
  bicocca: bicocca-ca-granda-parco-nord      # Bicocca, Ca' Granda, Parco Nord
  niguarda: bicocca-ca-granda-parco-nord     # Niguarda falls in same Casa.it zone
  precotto: gorla-greco-precotto             # Gorla, Greco, Precotto
  turro: gorla-greco-precotto               # Turro also in this zone
  greco-segnano: gorla-greco-precotto       # Greco/Segnano also in this zone
  citta-studi: citta-studi-corsica-susa     # Città Studi, Corsica, Susa
  lambrate: lambrate
  crescenzago: adriano-crescenzago-parco-lambro-cimiano
  centrale: centrale-repubblica

search_selectors:
  listing_card:
    - "[class*='csaSrpcard__cnt-card']"
  title:
    - "[class*='csaSrpcard__det__title--a']"
  price:
    - "[class*='csaSrpcard__det__feats--price']"
  features:
    - "[class*='csaSrpcard__det__feats__item']"
  address:
    # Zone name paragraph inside the info section — medium-size utility text
    - "[class*='csaSrpcard__det__infos'] p[class*='tp-s--m']"
  thumbnail:
    # Direct src (no lazy-loading) inside the gallery slider container
    - "[class*='csaSrpcard__gal__slider__imgcont'] img"
  description:
    - "[class*='csaSrpcard__det__feats__desc']"
  agency:
    - "[class*='csaSrpcard__det__contacts__agz__name']"

detail_selectors:
  title:
    - "h1[class*='csapdp-infos__tit']"
    - "h1"
  price:
    - "[class*='csapdp-infos__price']"
  description:
    - "[class*='descr']"
  # Characteristics table: li.chars_item > p.chars__lbl (key) + div.chars__cnt (value)
  features_keys:
    - "[class*='chars_item'] [class*='chars__lbl']"
  features_values:
    - "[class*='chars_item'] [class*='chars__cnt']"
  address:
    - "h1[class*='csapdp-infos__tit']"
  photos:
    # Listing photos only — /listing/ path excludes agency logos (/logo/)
    - "img[src*='/listing/']"
  energy_class:
    # Energy class value is in chars__cnt sibling of "Classe energetica" label
    - "[class*='chars_item'] [class*='chars__cnt']"
  agency:
    - "[class*='specific-form'] a[href*='/agenzie/']"
    - "[class*='specific-form__form'] p[class*='pb--ms']"
  costs_keys:
    - "[class*='chars_item'] [class*='chars__lbl']"
  costs_values:
    - "[class*='chars_item'] [class*='chars__cnt']"

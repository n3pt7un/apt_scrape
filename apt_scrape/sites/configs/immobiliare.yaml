site_id: immobiliare
display_name: Immobiliare.it
base_url: https://www.immobiliare.it
domain_pattern: 'immobiliare\.it'

search_path_template: "/{operation}-{property_type}/{city}/"
query_param_map:
  min_price: prezzoMinimo
  max_price: prezzoMassimo
  min_sqm: superficieMinima
  max_sqm: superficieMassima
  min_rooms: localiMinimo
  max_rooms: localiMassimo
  published_within: giorniPubblicazione
  sort: ordine
page_param: pag
search_wait_selector: "li.nd-list__item"
detail_wait_selector: h1

property_type_map:
  case: case
  appartamenti: appartamenti
  attici: attici
  case-indipendenti: case-indipendenti
  loft: loft
  rustici: rustici
  ville: ville
  villette: villette

operation_map:
  affitto: affitto
  vendita: vendita

search_selectors:
  listing_card:
    - "li.nd-list__item.ListItem_item__sugJm.ListItem_item__card__8WHcE"
    - "li.nd-list__item.ListItem_item__card__8WHcE"
    - "li.nd-list__item[class*='ListItem_item__card']"
    - "[class*='ListItem_item__card']"
    - "li.nd-list__item"
  title:
    - "a.Title_title__kPgMu"
    - "a[class*='Title_title']"
    - "a[href*='/annunci/']"
  price:
    - "div.Price_price__kHY5L span"
    - "div[class*='Price_price'] span"
    - "[class*='Price_price']"
  features:
    - "div.FeatureList_item__D3KYH"
    - "div[class*='FeatureList_item']"
    - "[class*='FeatureList_item']"
  address:
    # No dedicated address element on search cards — address is embedded in the title text.
    # These selectors serve as fallbacks only.
    - "a[class*='Title_title']"
    - "span[class*='address']"
    - "[class*='Address']"
  thumbnail:
    - "img[src*='pwm.im-cdn.it']"
    - "img[data-src*='pwm.im-cdn.it']"
    - "img[src*='pwm.im']"
    - "img"
  description:
    - "[class*='description']"

detail_selectors:
  title:
    - "h1[class*='Title_title']"
    - "h1"
  price:
    - "div[class*='Price_price']"
    - "[class*='Overview_price']"
    - "[class*='Price_price']"
  description:
    - "div[class*='ReadAll_readAll']"
    - "div[class*='ReadAll']"
    - "div[class*='description']"
    - "div[class*='Description']"
  features_keys:
    - "dl[class*='FeaturesGrid'] dt"
    - "dl[class*='FeaturesGrid_list'] dt"
    - "dt"
  features_values:
    - "dl[class*='FeaturesGrid'] dd"
    - "dl[class*='FeaturesGrid_list'] dd"
    - "dd"
  address:
    # LocationInfo spans (reversed in code) give: street, neighbourhood, city
    - "span[class*='LocationInfo_location']"
    - "span[class*='LocationInfo']"
    - "h1[class*='Title_title']"
  photos:
    - "[class*='Gallery_cont'] img"
    - "[class*='ListingPhotos'] img"
    - "img[src*='pwm.im-cdn.it']"
    - "img[src*='pwm.im']"
    - "[class*='Gallery'] img"
    - "[class*='gallery'] img"
  energy_class:
    # Energy class is now hidden behind a "vedi dettaglio" button on most listings.
    # These selectors may return empty; energy info may appear in the FeaturesGrid dl instead.
    - "[class*='Energy_label']"
    - "[class*='EnergyClass']"
    - "[aria-label*='energetica']"
    - "[aria-label*='Classe energetica']"
    - "[class*='Energy'] span"
  agency:
    - "[class*='ContactForm_agencyData']"
    - "[class*='ContactAgent_text']"
    - "[class*='ContactAgent']"
    - "[class*='advertiser']"
  costs_keys:
    # NOTE: ImmobiliareAdapter.parse_detail overrides costs extraction via prevSibling
    # text matching ("Dettaglio dei costi"), so these selectors are not used in practice.
    - "[class*='cost'] dt"
    - "[class*='costs'] dt"
  costs_values:
    - "[class*='cost'] dd"
    - "[class*='costs'] dd"
